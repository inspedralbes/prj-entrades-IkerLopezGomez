services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "3000:80"
    env_file:
      - .env
    depends_on:
      - laravel
      - nodejs
      - db
    networks:
      - app-network

  laravel:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app-network

  nodejs:
    build:
      context: ./backend-node
      dockerfile: Dockerfile.prod
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - app-network

  db:
    image: mysql:8.0
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data: