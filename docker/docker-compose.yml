# Configuració de Docker Compose per a tot el projecte

services:
  db:
    image: mysql:8.0
    container_name: ticketing_db_container
    restart: always
    environment:
      MYSQL_DATABASE: ticketing_db
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ../database/insert.sql:/docker-entrypoint-initdb.d/insert.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend-node:
    build:
      context: ../backend-node
      dockerfile: Dockerfile
    container_name: ticketing_backend_node_container
    restart: always
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: pass
      DB_NAME: ticketing_db
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "node", "-e", "const http = require('http'); const req = http.get('http://localhost:3000/api/estat', (res) => { if (res.statusCode === 200) { process.exit(0); } else { process.exit(1); } }); req.on('error', (err) => { process.exit(1); });" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  laravel-app:
    build:
      context: ../backend-laravel
      dockerfile: Dockerfile
    container_name: ticketing_laravel_app_container
    restart: always
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ticketing_db
      DB_USERNAME: user
      DB_PASSWORD: pass
      SANCTUM_STATEFUL_DOMAINS: "localhost:3001"
    volumes:
      - ../backend-laravel:/var/www
    healthcheck:
      test: [ "CMD", "php", "artisan", "--version" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  laravel-web:
    image: nginx:stable-alpine
    container_name: ticketing_laravel_web_container
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ../backend-laravel:/var/www
      - ../backend-laravel/docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel-app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ticketing_frontend_container
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.nuxt
    depends_on:
      backend-node:
        condition: service_healthy
      laravel-app:
        condition: service_healthy

volumes:
  db_data:
