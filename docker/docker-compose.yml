# Configuració de Docker Compose per al sistema de venda d'entrades d'alta concurrència.
# Defineix el servei MySQL 8.0 amb volums de dades persistents.
version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ticketing_db_container
    restart: always
    environment:
      MYSQL_DATABASE: ticketing_db
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
